[canvas]
width = 782
height = 1024
background = [255, 255, 255, 0]

[art]
# Draw card art only inside the visible card window, so it does not leak outside the frame.
x = 98
y = 194
width = 590
height = 711

# Source region from the unpacked 848x1024 illustration. Defaults to the full image;
# use [art] x/y/width/height for placement and let the frame cover the edges.
crop_x = 0
crop_y = 0
crop_width = 848
crop_height = 1024

[frame]
x = 0
y = 0
width = 782
height = 1024

[class_icon]
x = 366
y = 878
width = 50
height = 50

[name]
center_x = 420
center_y = 148
font_size = 60
max_width = 450
[cost]
center_x = 93
center_y = 128
font_size = 150
max_width = 150
[attack]
center_x = 98
center_y = 890
font_size = 150
max_width = 150
[defense]
center_x = 680
center_y = 882
font_size = 150
max_width = 150

# Per-card-kind overrides. Values default to the global sections above when a
# field is omitted. These are intentionally duplicated so each kind can be
