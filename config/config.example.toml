# 数据根目录
data_dir = "D:/WBUnpacker"

# 可选，默认 D:\Tools\vgmstream-win64\vgmstream-cli.exe
vgmstream_path = "D:/Tools/vgmstream-win64/vgmstream-cli.exe"
# 可选，默认用 PATH 中的 ffmpeg  
ffmpeg_path = "ffmpeg"

# wbunpacker 配置文件
# 复制为 Config.local.toml 后修改

# 资源版本号: 从 CDN 地址中获取，如 dl/manifests/Windows/<此处>/
default_version = "180106783552"

# Manifest 下载地址模板
# {version} = 资源版本号, {variant} = 语言变体 (Jpn 时自动省略后缀)
manifest_address = "https://shadowverse-wb.akamaized.net/dl/manifests/Windows/{version}/assetbundle.{variant}.manifest"

# AssetBundle 下载地址模板
# {hash_dir} = hash 前2位, {hash} = 完整 hash
asset_bundle_address = "https://shadowverse-wb.akamaized.net/dl/assetbundles/Windows/{hash_dir}/{hash}"

# 服务器 API 地址
version_address = "https://web11.shadowverse-wb.jp/cygames/Version/info"

# 请求头
routing_header = ""

# 客户端信息
app_version = "1.7.10"
client_id = 0

# 解密密钥
asset_bundle_base_keys = ""
sqlite3mc_key = ""
sqlite3mc_base_key = ""

[device_info]
platform = 4
device = 3
device_name = ""
platform_os_version = ""
gpu_vendor = ""
graphics_memory_mb = ""
processor_type = ""

# AssetStudioModCLI 路径
asset_studio_path = "D:/Tools/AssetStudioModCLI_net9_win64/AssetStudioModCLI.exe"
